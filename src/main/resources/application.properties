# MongoDB connection
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ecommerce}

# JWT configuration
jwt.secret=${JWT_SECRET:my-super-secret-key-for-dev-only-change-in-prod}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Server
server.port=${PORT:8080}

# Disable Spring Security's default password generation
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Logging
logging.level.learnMongoDb=INFO

# ==========================
# Login Security (Phase 1)
# ==========================

# ... your existing properties ...

# Security Hardening Settings
security.login.max-failed-attempts=5
security.login.lock-duration-minutes=15
security.login.rate-limit-duration-seconds=60