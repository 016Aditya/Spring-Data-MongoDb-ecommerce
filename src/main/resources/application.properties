# MongoDB connection
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ecommerce}

# JWT configuration
jwt.secret=${JWT_SECRET:my-super-secret-key-for-dev-only-change-in-prod}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Server
server.port=${PORT:8080}

# Disable Spring Security's default password generation
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Logging
logging.level.learnMongoDb=INFO

# ==========================
# Login Security (Phase 1)
# ==========================
security.login.max-failed-attempts=5
security.login.lock-duration-minutes=15
security.login.rate-limit-duration-seconds=60

# ==========================
# Login Security (Phase 2)
# ==========================
security.login.progressive-delay.enabled=true
security.login.progressive-delay.base-delay-seconds=2
security.login.progressive-delay.max-delay-seconds=30
security.login.rate-limit.use-ip-and-email=true

# ==========================
# Login Security (Phase 3)
# ==========================
# Cloudflare Turnstile
turnstile.enabled=true
turnstile.site-key=${TURNSTILE_SITE_KEY:your-site-key-here}
turnstile.secret-key=${TURNSTILE_SECRET_KEY:your-secret-key-here}
turnstile.verify-url=https://challenges.cloudflare.com/turnstile/v0/siteverify
turnstile.timeout-seconds=3

# CAPTCHA Triggers
security.login.captcha.enabled=true
security.login.captcha.threshold=3